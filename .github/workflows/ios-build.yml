name: iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (Strict Bypass)
        run: |
          # cupertino_native වල Swift error එක ආවත් build එක ඉදිරියට ගෙනියන්න කියලා අපි කියනවා
          flutter build ios --release --no-codesign || true
          
          # ඇත්තටම Runner.app එක හැදිලා තියෙනවා නම් විතරක් IPA එක හදනවා
          cd build/ios/iphoneos
          if [ -d "Runner.app" ]; then
            mkdir Payload
            cp -r Runner.app Payload/
            zip -r app.ipa Payload
          else
            echo "Error: Runner.app not found. Build failed!"
            exit 1
          fi
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ios/iphoneos/app.ipa
